<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wing Nomads Spot</title>
  <link rel="stylesheet" href="style.css?v=30000" />
</head>

<body>

<section class="spot-page">

  <a href="index.html#spots" class="back-link">← Back to spots</a>

  <section class="spot-hero-detail">
    <img id="spot-image" alt="Flying spot image">

    <div class="spot-hero-overlay">
      <p id="spot-country" class="eyebrow"></p>
      <h1 id="spot-name"></h1>
      <p id="spot-meta"></p>
    </div>
  </section>

  <section class="spot-detail-content">

    <div class="spot-main-info">
      <p id="spot-description" class="spot-description-detail"></p>
    </div>

    <div class="spot-detail-grid">

      <div class="spot-detail-card">
        <small>Difficulty</small>
        <p id="spot-difficulty"></p>
      </div>

      <div class="spot-detail-card">
        <small>Best Season</small>
        <p id="spot-season"></p>
      </div>

      <div class="spot-detail-card">
        <small>Wind Directions</small>
        <p id="spot-wind"></p>
      </div>

      <div class="spot-detail-card">
        <small>Van Friendly</small>
        <p id="spot-van"></p>
      </div>

    </div>

    <section class="local-community-box">
      <div>
        <p class="eyebrow">Local Community</p>
        <h2>Connect with local pilots</h2>
        <p>
          Find the local flying community, ask about conditions and connect with pilots already flying here.
        </p>
      </div>

      <div id="spot-community" class="community-actions"></div>
    </section>

  </section>

</section>

<script>
const SUPABASE_URL = "https://fdpyqsqflwqmyubugitn.supabase.co";
const SUPABASE_KEY = "sb_publishable_CHWsP3y0fChbq4Pcjq5pvQ_dngXSe69";

const params = new URLSearchParams(window.location.search);
const slug = params.get("id");

async function loadSpot() {
  const response = await fetch(
    `${SUPABASE_URL}/rest/v1/spots?slug=eq.${slug}&select=*`,
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`
      }
    }
  );

  const data = await response.json();
  const spot = data[0];

  if (!spot) {
    document.body.innerHTML = "<h1 style='padding:40px;'>Spot not found</h1>";
    return;
  }

  document.getElementById("spot-image").src =
    spot.image_url ||
    spot.image ||
    "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1600&q=80";

  document.getElementById("spot-country").textContent =
    spot.country || "";

  document.getElementById("spot-name").textContent =
    spot.name || "Unnamed Spot";

  document.getElementById("spot-meta").textContent =
    `${spot.region || ""} · ${spot.flying_type || "Paragliding"}`;

  document.getElementById("spot-difficulty").textContent =
    spot.difficulty || "Not specified";

  document.getElementById("spot-season").textContent =
    spot.best_season || "Not specified";

  document.getElementById("spot-wind").textContent =
    spot.wind_directions || "Not specified";

  document.getElementById("spot-van").textContent =
    spot.van_friendly ? "Yes 🚐" : "No";

  document.getElementById("spot-description").textContent =
    spot.description || "No description added yet.";

  const community = [];

  if (spot.whatsapp_group_url) {
    community.push(`<a href="${spot.whatsapp_group_url}" target="_blank">Join WhatsApp Group</a>`);
  }

  if (spot.local_club_url) {
    community.push(`<a href="${spot.local_club_url}" target="_blank">Visit Local Club</a>`);
  }

  document.getElementById("spot-community").innerHTML =
    community.length ? community.join("") : "<p>No local community links added yet.</p>";
}

loadSpot();
</script>

</body>
</html>
