<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wing Nomads Pilot</title>

<link rel="stylesheet" href="style.css?v=27002" />

<style>
.pilot-page{
  min-height:100vh;
  background:#f6f1e8;
  padding:120px 7% 80px;
}

.back-link{
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-bottom:26px;
  color:#222;
  text-decoration:none;
  font-weight:850;
  font-size:14px;
  letter-spacing:.02em;
}

.pilot-shell{
  max-width:1180px;
  margin:0 auto;
}

.pilot-profile{
  background:#fffdf9;
  border:1px solid rgba(0,0,0,.06);
  border-radius:30px;
  overflow:hidden;
  box-shadow:0 28px 80px rgba(0,0,0,.12);
}

.pilot-hero{
  display:grid;
  grid-template-columns:1.05fr .95fr;
  min-height:520px;
}

.pilot-photo{
  position:relative;
  min-height:520px;
  background:#ddd;
  overflow:hidden;
}

.pilot-photo img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.pilot-photo::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    to top,
    rgba(0,0,0,.38),
    rgba(0,0,0,.04) 55%,
    rgba(0,0,0,0)
  );
}

.pilot-hero-content{
  padding:52px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.pilot-kicker{
  color:#c46a3c;
  font-size:13px;
  font-weight:950;
  letter-spacing:.12em;
  text-transform:uppercase;
  margin-bottom:16px;
}

.pilot-name{
  font-size:64px;
  line-height:.92;
  letter-spacing:-.05em;
  margin:0 0 24px;
  color:#171717;
  font-weight:950;
}

.pilot-tags{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:34px;
}

.pilot-tag{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:#f4efe7;
  border:1px solid #e6ded2;
  color:#292929;
  padding:10px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.04em;
}

.pilot-bio{
  background:#f8f3eb;
  border:1px solid #eee4d8;
  border-radius:22px;
  padding:26px;
  margin-top:12px;
}

.section-label{
  display:block;
  color:#8c887f;
  font-size:12px;
  font-weight:950;
  text-transform:uppercase;
  letter-spacing:.12em;
  margin-bottom:12px;
}

.pilot-bio p{
  margin:0;
  color:#333;
  font-size:18px;
  line-height:1.6;
}

.pilot-actions{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-top:36px;
}

.pilot-link{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  min-height:48px;
  padding:13px 18px;
  border-radius:14px;
  text-decoration:none;
  font-size:14px;
  font-weight:950;
  color:#191919;
  background:#fff;
  border:1px solid #ded5c9;
  transition:.2s ease;
}

.pilot-link:hover{
  transform:translateY(-2px);
  background:#111;
  color:white;
  border-color:#111;
}

.pilot-link.disabled{
  opacity:.55;
  pointer-events:none;
}

.pilot-details{
  padding:0 52px 52px;
}

.pilot-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
}

.detail-card{
  background:#fff;
  border:1px solid #eadfd2;
  border-radius:22px;
  padding:24px;
  min-height:150px;
  box-shadow:0 10px 30px rgba(0,0,0,.045);
}

.detail-icon{
  width:42px;
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:14px;
  background:#f4efe7;
  margin-bottom:18px;
  font-size:20px;
}

.detail-card p{
  margin:0;
  color:#1f1f1f;
  font-size:20px;
  font-weight:900;
  line-height:1.25;
}

.pilot-extra{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  margin-top:18px;
}

.extra-card{
  background:#171717;
  color:#fff;
  border-radius:24px;
  padding:28px;
  min-height:170px;
}

.extra-card.light{
  background:#f8f3eb;
  color:#171717;
  border:1px solid #eadfd2;
}

.extra-card p{
  margin:0;
  font-size:18px;
  line-height:1.55;
  color:inherit;
}

.empty-state{
  max-width:720px;
  margin:120px auto;
  text-align:center;
  background:#fffdf9;
  padding:54px;
  border-radius:28px;
  box-shadow:0 22px 70px rgba(0,0,0,.1);
}

.empty-state h1{
  margin:0 0 14px;
  font-size:44px;
  letter-spacing:-.04em;
}

.empty-state p{
  color:#666;
  font-size:18px;
  margin:0 0 24px;
}

@media(max-width:980px){
  .pilot-hero{
    grid-template-columns:1fr;
  }

  .pilot-photo{
    min-height:430px;
  }

  .pilot-hero-content{
    padding:42px;
  }

  .pilot-details{
    padding:0 42px 42px;
  }

  .pilot-name{
    font-size:56px;
  }

  .pilot-grid{
    grid-template-columns:1fr;
  }

  .pilot-extra{
    grid-template-columns:1fr;
  }
}

@media(max-width:640px){
  .pilot-page{
    padding:92px 18px 54px;
  }

  .pilot-profile{
    border-radius:24px;
  }

  .pilot-photo{
    min-height:310px;
  }

  .pilot-hero-content{
    padding:30px 22px;
  }

  .pilot-details{
    padding:0 22px 28px;
  }

  .pilot-name{
    font-size:42px;
  }

  .pilot-bio{
    padding:22px;
  }

  .pilot-bio p{
    font-size:16px;
  }

  .pilot-actions{
    flex-direction:column;
  }

  .pilot-link{
    width:100%;
  }

  .detail-card{
    min-height:auto;
  }

  .detail-card p{
    font-size:18px;
  }
}
</style>
</head>

<body>

<section class="pilot-page">
  <div class="pilot-shell">

    <a href="profiles.html" class="back-link">← Back to pilots</a>

    <div id="pilot-wrapper"></div>

  </div>
</section>

<script>
const SUPABASE_URL = "https://fdpyqsqflwqmyubugitn.supabase.co";
const SUPABASE_KEY = "sb_publishable_CHWsP3y0fChbq4Pcjq5pvQ_dngXSe69";

const params = new URLSearchParams(window.location.search);
const username = params.get("user");
const wrapper = document.getElementById("pilot-wrapper");

function safe(value, fallback = "Not added"){
  return value && String(value).trim() !== "" ? String(value).trim() : fallback;
}

function instagramUrl(value){
  if(!value) return null;

  let handle = String(value).trim();

  if(handle.startsWith("http")) return handle;

  handle = handle.replace("@", "");
  return `https://instagram.com/${handle}`;
}

function instagramLabel(value){
  if(!value) return "Instagram not added";

  let handle = String(value).trim();

  if(handle.startsWith("http")){
    handle = handle.split("instagram.com/")[1] || handle;
    handle = handle.replaceAll("/", "");
  }

  handle = handle.replace("@", "");
  return `@${handle}`;
}

function showEmptyState(title, text){
  wrapper.innerHTML = `
    <div class="empty-state">
      <h1>${title}</h1>
      <p>${text}</p>
      <a href="profiles.html" class="pilot-link">← Back to pilots</a>
    </div>
  `;
}

async function loadPilot(){

  if(!username){
    showEmptyState("Pilot not found", "No pilot username was provided.");
    return;
  }

  const response = await fetch(
    `${SUPABASE_URL}/rest/v1/profiles?username=eq.${encodeURIComponent(username)}&select=*`,
    {
      headers:{
        apikey:SUPABASE_KEY,
        Authorization:`Bearer ${SUPABASE_KEY}`
      }
    }
  );

  const data = await response.json();
  const pilot = data[0];

  if(!pilot){
    showEmptyState("Pilot not found", "This pilot profile does not exist yet.");
    return;
  }

  const image = safe(
    pilot.profile_image,
    "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
  );

  const name = safe(pilot.full_name, "Unnamed Pilot");
  const country = safe(pilot.country, "Unknown location");
  const level = safe(pilot.level, "Level not added");
  const flyingType = safe(pilot.flying_type, "Flying type not added");
  const homeSpot = safe(pilot.home_spot);
  const nextDestination = safe(pilot.next_destination, "Open to adventure");
  const bio = safe(pilot.bio, "This pilot has not added a bio yet.");
  const instagram = pilot.instagram;
  const instaUrl = instagramUrl(instagram);
  const instaLabel = instagramLabel(instagram);

  wrapper.innerHTML = `
    <article class="pilot-profile">

      <div class="pilot-hero">

        <div class="pilot-photo">
          <img src="${image}" alt="${name}">
        </div>

        <div class="pilot-hero-content">

          <div>
            <div class="pilot-kicker">📍 ${country}</div>

            <h1 class="pilot-name">${name}</h1>

            <div class="pilot-tags">
              <span class="pilot-tag">🪂 ${level}</span>
              <span class="pilot-tag">🌬️ ${flyingType}</span>
            </div>

            <div class="pilot-bio">
              <span class="section-label">About</span>
              <p>${bio}</p>
            </div>
          </div>

          <div class="pilot-actions">
            ${
              instaUrl
              ? `<a href="${instaUrl}" target="_blank" rel="noopener" class="pilot-link">◎ ${instaLabel}</a>`
              : `<span class="pilot-link disabled">◎ Instagram not added</span>`
            }
            <a href="profiles.html" class="pilot-link">Explore pilots</a>
          </div>

        </div>

      </div>

      <div class="pilot-details">

        <div class="pilot-grid">

          <div class="detail-card">
            <div class="detail-icon">🏔️</div>
            <span class="section-label">Home Spot</span>
            <p>${homeSpot}</p>
          </div>

          <div class="detail-card">
            <div class="detail-icon">🧭</div>
            <span class="section-label">Next Destination</span>
            <p>${nextDestination}</p>
          </div>

          <div class="detail-card">
            <div class="detail-icon">◎</div>
            <span class="section-label">Connect</span>
            <p>${instaLabel}</p>
          </div>

        </div>

        <div class="pilot-extra">

          <div class="extra-card">
            <span class="section-label">Wing Nomads</span>
            <p>Find pilots nearby, discover flying places and connect before your next adventure.</p>
          </div>

          <div class="extra-card light">
            <span class="section-label">Pilot Status</span>
            <p>Available for future flying plans, shared adventures and local spot recommendations.</p>
          </div>

        </div>

      </div>

    </article>
  `;
}

loadPilot();
</script>

</body>
</html>
