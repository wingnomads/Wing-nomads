<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wing Nomads Pilot</title>

<link rel="stylesheet" href="style.css?v=27000">

<style>
.pilot-page{
  min-height:100vh;
  background:#f6f1e8;
  padding:120px 7%;
}

.pilot-profile{
  max-width:1000px;
  margin:auto;
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.12);
}

.pilot-cover{
  height:350px;
  background:#ddd;
}

.pilot-cover img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.pilot-content{
  padding:40px;
}

.pilot-country{
  color:#c46a3c;
  font-weight:800;
  text-transform:uppercase;
  margin-bottom:10px;
}

.pilot-name{
  font-size:56px;
  font-weight:900;
  line-height:1;
  margin-bottom:20px;
}

.pilot-meta{
  font-size:18px;
  color:#666;
  margin-bottom:40px;
}

.info-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
}

.info-card{
  background:#faf7f2;
  padding:24px;
  border-radius:12px;
}

.info-card small{
  display:block;
  text-transform:uppercase;
  font-weight:800;
  color:#888;
  margin-bottom:8px;
}

.info-card p{
  font-size:20px;
  font-weight:700;
}

@media(max-width:768px){

  .pilot-name{
    font-size:42px;
  }

  .info-grid{
    grid-template-columns:1fr;
  }
}
</style>

</head>
<body>

<section class="pilot-page">

  <div class="pilot-profile">

    <div class="pilot-cover">
      <img id="pilot-image">
    </div>

    <div class="pilot-content">

      <div id="pilot-country" class="pilot-country"></div>

      <h1 id="pilot-name" class="pilot-name"></h1>

      <p id="pilot-meta" class="pilot-meta"></p>

      <div class="info-grid">

        <div class="info-card">
          <small>Favourite Spot</small>
          <p id="pilot-spot"></p>
        </div>

        <div class="info-card">
          <small>Next Destination</small>
          <p id="pilot-destination"></p>
        </div>

        <div class="info-card">
          <small>Instagram</small>
          <p id="pilot-instagram"></p>
        </div>

      </div>

    </div>

  </div>

</section>

<script>

const SUPABASE_URL = "https://fdpyqsqflwqmyubugitn.supabase.co";
const SUPABASE_KEY = "sb_publishable_CHWsP3y0fChbq4Pcjq5pvQ_dngXSe69";
  
const params = new URLSearchParams(window.location.search);
const username = params.get("user");

async function loadPilot(){

  const response = await fetch(
    `${SUPABASE_URL}/rest/v1/profiles?username=eq.${username}&select=*`,
    {
      headers:{
        apikey:SUPABASE_KEY,
        Authorization:`Bearer ${SUPABASE_KEY}`
      }
    }
  );

  const data = await response.json();

  const pilot = data[0];

  if(!pilot) return;

  document.getElementById("pilot-image").src =
    pilot.profile_image ||
    "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee";

  document.getElementById("pilot-country").textContent =
    pilot.country;

  document.getElementById("pilot-name").textContent =
    pilot.full_name;

  document.getElementById("pilot-meta").textContent =
    `${pilot.level} · ${pilot.flying_type}`;

  document.getElementById("pilot-spot").textContent =
    pilot.home_spot || "Not added";

  document.getElementById("pilot-destination").textContent =
    pilot.next_destination || "Open";

  document.getElementById("pilot-instagram").textContent =
    pilot.instagram || "-";
}

loadPilot();

</script>

</body>
</html>
